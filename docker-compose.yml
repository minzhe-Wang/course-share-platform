services:
  mysql:
    image: mysql:8.0
    container_name: course_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: course_share
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - course_net

  redis:
    image: redis:7
    container_name: course_redis
    restart: always
    ports:
      - "6379:6379"
    networks:
      - course_net

  minio:
    image: minio/minio
    container_name: course_minio
    restart: always
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - course_net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: course_backend
    restart: always
    depends_on:
      - mysql
      - redis
      - minio
    environment:
      SPRING_PROFILES_ACTIVE: docker
    ports:
      - "8080:8080"
    networks:
      - course_net

networks:
  course_net:

volumes:
  mysql_data:
  minio_data: